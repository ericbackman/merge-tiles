name: Deploy to Cloudflare Pages

# On every push to main: build the Vite app and publish dist/ to the
# Cloudflare Pages project `merge-tiles` (serves 2048.ericbackman.com).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 3a9b0f83a62fd482af5f54911dd90808
          command: pages deploy dist --project-name merge-tiles --branch main
